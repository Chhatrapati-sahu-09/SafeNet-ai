<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeNet AI Settings</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f8fafc;
        color: #1f2937;
      }

      .wrap {
        max-width: 720px;
        margin: 40px auto;
        padding: 24px;
        background: #ffffff;
        border-radius: 12px;
        border: 1px solid #e5e7eb;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 20px;
        color: #4b5563;
      }

      .status {
        padding: 12px 14px;
        border-radius: 8px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        color: #1d4ed8;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>SafeNet AI Settings</h1>
      <p>Advanced settings will be available here in upcoming updates.</p>
      <div class="status" id="status">
        Current filters are loaded from Chrome sync storage.
      </div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
